name: 🚀 Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  build:
    name: 🔨 Build & Sign Release Artifacts
    runs-on: ${{ vars.IS_USING_HOSTED_RUNNERS == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    outputs:
      version: ${{ steps.version.outputs.version }}
      short_sha: ${{ steps.version.outputs.short_sha }}
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 🔖 Set version info
        id: version
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "version=${TAG}" >> $GITHUB_OUTPUT
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: ☕ Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 🔑 Create google-services.json
        run: echo '${{ secrets.GOOGLE_SERVICES_JSON }}' > app/google-services.json

      - name: 🐘 Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-disabled: true

      - name: 🏗️ Build Release APK & AAB
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_SYNAPSE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_SYNAPSE_ANON_KEY }}
          SUPABASE_SYNAPSE_S3_ENDPOINT_URL: ${{ secrets.SUPABASE_SYNAPSE_S3_ENDPOINT_URL }}
          SUPABASE_SYNAPSE_S3_ENDPOINT_REGION: ${{ secrets.SUPABASE_SYNAPSE_S3_ENDPOINT_REGION }}
          SUPABASE_SYNAPSE_S3_ACCESS_KEY_ID: ${{ secrets.SUPABASE_SYNAPSE_S3_ACCESS_KEY_ID }}
          SUPABASE_SYNAPSE_S3_ACCESS_KEY: ${{ secrets.SUPABASE_SYNAPSE_S3_ACCESS_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          IMGBB_API_KEY: ${{ secrets.IMGBB_API_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_WEB_CLIENT_SECRET: ${{ secrets.GOOGLE_WEB_CLIENT_SECRET }}
          ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
          GRADLE_OPTS: "-Xmx6g -Dorg.gradle.jvmargs='-Xmx6g -XX:MaxMetaspaceSize=1g'"
        run: ./gradlew assembleRelease bundleRelease --no-daemon -PprojectVersion=${{ steps.version.outputs.version }}

      - name: ✏️ Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mv app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/synapse-${VERSION}.apk
          mv app/build/outputs/bundle/release/app-release.aab \
             app/build/outputs/bundle/release/synapse-${VERSION}.aab

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: apk-${{ steps.version.outputs.version }}
          path: app/build/outputs/apk/release/synapse-${{ steps.version.outputs.version }}.apk

      - name: 📤 Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ steps.version.outputs.version }}
          path: app/build/outputs/bundle/release/synapse-${{ steps.version.outputs.version }}.aab

  release:
    name: 📦 Create GitHub Release
    runs-on: ${{ vars.IS_USING_HOSTED_RUNNERS == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    needs: build
    permissions:
      contents: write
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-${{ needs.build.outputs.version }}
          path: ./artifacts

      - name: 📥 Download AAB
        uses: actions/download-artifact@v4
        with:
          name: aab-${{ needs.build.outputs.version }}
          path: ./artifacts

      - name: 🚀 Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: Synapse ${{ needs.build.outputs.version }}
          generate_release_notes: true
          files: |
            artifacts/synapse-${{ needs.build.outputs.version }}.apk
            artifacts/synapse-${{ needs.build.outputs.version }}.aab

  notify:
    name: 📣 Notify Telegram
    runs-on: ${{ vars.IS_USING_HOSTED_RUNNERS == 'true' && 'self-hosted' || 'ubuntu-latest' }}
    needs: [build, release]
    if: always() && needs.build.result == 'success'
    steps:
      - name: 🛎️ Checkout
        uses: actions/checkout@v4

      - name: 📥 Download APK
        uses: actions/download-artifact@v4
        with:
          name: apk-${{ needs.build.outputs.version }}
          path: ./downloaded-artifact

      - name: 🐍 Set up Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 📦 Install Dependencies
        run: pip install telethon

      - name: 💾 Restore Telegram session cache
        uses: actions/cache@v4
        with:
          path: bot_session.session
          key: telegram-session-${{ runner.os }}-bot_session

      - name: 📨 Send to Telegram
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TOPIC_ID: ${{ secrets.TELEGRAM_TOPIC_ID }}
          APK_PATH: ./downloaded-artifact/synapse-${{ needs.build.outputs.version }}.apk
          GITHUB_ACTOR: ${{ github.actor }}
        run: python ./.github/workflows/deploy_artifacts.py
        continue-on-error: true
